<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>代理店案件ダッシュボード</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2f;
      --panel-2: #18233f;
      --line: #2a3558;
      --text: #eef3ff;
      --muted: #9fb0d9;
      --accent: #7aa2ff;
      --accent-2: #7ef0c2;
      --danger: #ff8f8f;
      --warning: #ffd27a;
      --chip: #243256;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #09101d 0%, #0f1730 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.2;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn, .file-label {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow);
    }

    .btn:hover, .file-label:hover {
      border-color: var(--accent);
    }

    input[type="file"] {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }

    .panel {
      background: rgba(18, 26, 47, 0.92);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }

    .metric .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .metric .value {
      font-size: 28px;
      font-weight: 700;
    }

    .filter-group {
      margin-bottom: 16px;
    }

    .filter-group label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input, .select {
      width: 100%;
      background: #0f1730;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    .input:focus, .select:focus {
      border-color: var(--accent);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .chip.active {
      border-color: var(--accent-2);
      color: #08131b;
      background: var(--accent-2);
      font-weight: 700;
    }

    .sub-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .toolbar .left, .toolbar .right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1200px;
      background: rgba(10, 16, 32, 0.88);
    }

    thead th {
      position: sticky;
      top: 0;
      background: #121b34;
      color: var(--muted);
      text-align: left;
      font-size: 12px;
      letter-spacing: .02em;
      border-bottom: 1px solid var(--line);
      padding: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    tbody td {
      border-bottom: 1px solid rgba(42,53,88,.6);
      padding: 12px;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.55;
    }

    tbody tr:hover {
      background: rgba(122,162,255,.06);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge.active {
      background: rgba(126,240,194,.12);
      color: var(--accent-2);
      border-color: rgba(126,240,194,.35);
    }

    .badge.inactive {
      background: rgba(255,143,143,.12);
      color: var(--danger);
      border-color: rgba(255,143,143,.35);
    }

    .title-cell {
      min-width: 280px;
    }

    .title-link {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }

    .title-link:hover {
      color: var(--accent);
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 12px;
    }

    .nowrap {
      white-space: nowrap;
    }

    .empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 14px;
      }
      .header {
        grid-template-columns: 1fr;
      }
      .metrics {
        grid-template-columns: 1fr 1fr;
      }
      .title h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">
        <h1>代理店案件ダッシュボード</h1>
        <p>CSVを読み込むだけで、案件一覧・検索・絞り込み・新着確認ができます。</p>
      </div>
      <div class="top-actions">
        <label class="file-label">
          CSVを選択
          <input type="file" id="csvFile" accept=".csv" />
        </label>
        <button class="btn" id="downloadFilteredBtn">絞り込み結果をCSV保存</button>
        <button class="btn" id="resetBtn">絞り込みリセット</button>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="label">総件数</div>
        <div class="value" id="totalCount">0</div>
      </div>
      <div class="metric">
        <div class="label">表示件数</div>
        <div class="value" id="visibleCount">0</div>
      </div>
      <div class="metric">
        <div class="label">新着候補（7日以内）</div>
        <div class="value" id="newCount">0</div>
      </div>
      <div class="metric">
        <div class="label">継続収益あり</div>
        <div class="value" id="recurringCount">0</div>
      </div>
    </div>

    <div class="grid">
      <aside class="panel">
        <h2>絞り込み</h2>

        <div class="filter-group">
          <label for="keywordInput">キーワード検索</label>
          <input class="input" id="keywordInput" type="text" placeholder="案件名 / 会社名 / カテゴリ / 報酬 / 要約" />
        </div>

        <div class="filter-group">
          <label for="siteFilter">サイト</label>
          <select class="select" id="siteFilter">
            <option value="">すべて</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="statusFilter">ステータス</label>
          <select class="select" id="statusFilter">
            <option value="">すべて</option>
            <option value="active">active</option>
            <option value="inactive">inactive</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="sortFilter">並び順</label>
          <select class="select" id="sortFilter">
            <option value="scraped_at_desc">取得日時が新しい順</option>
            <option value="title_asc">案件名 A→Z</option>
            <option value="site_asc">サイト順</option>
            <option value="published_at_desc">掲載日が新しい順</option>
          </select>
        </div>

        <div class="filter-group">
          <label>クイック抽出</label>
          <div class="chips">
            <div class="chip" data-filter="network">通信</div>
            <div class="chip" data-filter="ai">AI</div>
            <div class="chip" data-filter="meo">MEO</div>
            <div class="chip" data-filter="seo">SEO</div>
            <div class="chip" data-filter="power">電力</div>
            <div class="chip" data-filter="recurring">継続収益あり</div>
            <div class="chip" data-filter="active">activeのみ</div>
            <div class="chip" data-filter="new7">7日以内</div>
          </div>
        </div>

        <div class="filter-group">
          <label>操作</label>
          <div class="sub-actions">
            <button class="btn" id="showTopNetworkBtn">通信だけ表示</button>
            <button class="btn" id="showTopAIBtn">AIだけ表示</button>
          </div>
        </div>

        <div class="hint">
          読み込み後は、CSVの全列を保持したままブラウザ内で絞り込みます。  
          詳細URLを押すと案件ページを新しいタブで開けます。
        </div>
      </aside>

      <main class="panel">
        <div class="toolbar">
          <div class="left">
            <div class="status" id="statusText">CSVを読み込んでください</div>
          </div>
          <div class="right">
            <div class="status" id="loadedFileName"></div>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-sort="site_name">サイト</th>
                <th data-sort="title">案件名</th>
                <th data-sort="company_name">会社名</th>
                <th data-sort="category">カテゴリ</th>
                <th data-sort="contract_type">契約形態</th>
                <th data-sort="reward_text">報酬</th>
                <th data-sort="initial_cost">初期費用</th>
                <th data-sort="recurring_revenue">継続収益</th>
                <th data-sort="area">エリア</th>
                <th data-sort="status">ステータス</th>
                <th data-sort="published_at">掲載日</th>
                <th data-sort="scraped_at">取得日時</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="12" class="empty">CSVを読み込むとここに一覧が表示されます</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script>
    const state = {
      rows: [],
      filtered: [],
      sortKey: "scraped_at",
      sortDirection: "desc",
      quickFilters: new Set(),
      loadedFileName: ""
    };

    const csvFile = document.getElementById("csvFile");
    const keywordInput = document.getElementById("keywordInput");
    const siteFilter = document.getElementById("siteFilter");
    const statusFilter = document.getElementById("statusFilter");
    const sortFilter = document.getElementById("sortFilter");
    const tableBody = document.getElementById("tableBody");
    const totalCount = document.getElementById("totalCount");
    const visibleCount = document.getElementById("visibleCount");
    const newCount = document.getElementById("newCount");
    const recurringCount = document.getElementById("recurringCount");
    const statusText = document.getElementById("statusText");
    const loadedFileName = document.getElementById("loadedFileName");
    const downloadFilteredBtn = document.getElementById("downloadFilteredBtn");
    const resetBtn = document.getElementById("resetBtn");
    const showTopNetworkBtn = document.getElementById("showTopNetworkBtn");
    const showTopAIBtn = document.getElementById("showTopAIBtn");

    csvFile.addEventListener("change", handleFileSelect);
    keywordInput.addEventListener("input", applyFilters);
    siteFilter.addEventListener("change", applyFilters);
    statusFilter.addEventListener("change", applyFilters);
    sortFilter.addEventListener("change", handleSortSelectChange);
    downloadFilteredBtn.addEventListener("click", downloadFilteredCsv);
    resetBtn.addEventListener("click", resetFilters);
    showTopNetworkBtn.addEventListener("click", () => applySingleQuickFilter("network"));
    showTopAIBtn.addEventListener("click", () => applySingleQuickFilter("ai"));

    document.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        const key = chip.dataset.filter;
        if (state.quickFilters.has(key)) {
          state.quickFilters.delete(key);
          chip.classList.remove("active");
        } else {
          state.quickFilters.add(key);
          chip.classList.add("active");
        }
        applyFilters();
      });
    });

    document.querySelectorAll("th[data-sort]").forEach(th => {
      th.addEventListener("click", () => {
        const key = th.dataset.sort;
        if (state.sortKey === key) {
          state.sortDirection = state.sortDirection === "asc" ? "desc" : "asc";
        } else {
          state.sortKey = key;
          state.sortDirection = key === "title" || key === "site_name" ? "asc" : "desc";
        }
        syncSortSelect();
        applyFilters();
      });
    });

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      state.loadedFileName = file.name;
      loadedFileName.textContent = file.name;

      const reader = new FileReader();
      reader.onload = e => {
        const text = e.target.result;
        const rows = parseCsv(text);
        state.rows = rows.map(normalizeRow);
        populateSiteFilter();
        syncMetricsBase();
        applyFilters();
      };
      reader.readAsText(file, "utf-8");
    }

    function parseCsv(text) {
      const lines = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            value += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(value);
          lines.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }

      if (value.length > 0 || row.length > 0) {
        row.push(value);
        lines.push(row);
      }

      if (!lines.length) return [];

      const headers = lines[0].map(h => h.trim());
      return lines.slice(1)
        .filter(r => r.some(cell => String(cell).trim() !== ""))
        .map(r => {
          const obj = {};
          headers.forEach((h, idx) => obj[h] = (r[idx] || "").trim());
          return obj;
        });
    }

    function normalizeRow(row) {
      const normalized = {};
      Object.keys(row).forEach(key => {
        normalized[key] = String(row[key] || "").trim();
      });

      normalized._search = [
        normalized.site_name,
        normalized.title,
        normalized.company_name,
        normalized.category,
        normalized.contract_type,
        normalized.reward_text,
        normalized.initial_cost,
        normalized.recurring_revenue,
        normalized.area,
        normalized.target_persona,
        normalized.summary,
        normalized.features
      ].join(" ").toLowerCase();

      normalized._isNew7 = isWithinDays(normalized.scraped_at, 7) || isWithinDays(normalized.first_seen_at, 7);
      normalized._isRecurring = /あり|継続|ストック|毎月|月額/i.test(
        `${normalized.recurring_revenue} ${normalized.reward_text} ${normalized.summary}`
      );

      return normalized;
    }

    function isWithinDays(dateStr, days) {
      if (!dateStr) return false;
      const d = new Date(dateStr.replace("Z", ""));
      if (Number.isNaN(d.getTime())) return false;
      const now = new Date();
      const diff = now - d;
      return diff >= 0 && diff <= days * 24 * 60 * 60 * 1000;
    }

    function populateSiteFilter() {
      const current = siteFilter.value;
      const sites = [...new Set(state.rows.map(r => r.site_name).filter(Boolean))].sort();
      siteFilter.innerHTML = '<option value="">すべて</option>' +
        sites.map(site => `<option value="${escapeHtml(site)}">${escapeHtml(site)}</option>`).join("");
      if (sites.includes(current)) {
        siteFilter.value = current;
      }
    }

    function syncMetricsBase() {
      totalCount.textContent = state.rows.length.toLocaleString();
      newCount.textContent = state.rows.filter(r => r._isNew7).length.toLocaleString();
      recurringCount.textContent = state.rows.filter(r => r._isRecurring).length.toLocaleString();
    }

    function applyFilters() {
      const keyword = keywordInput.value.trim().toLowerCase();
      const site = siteFilter.value;
      const status = statusFilter.value;

      let rows = state.rows.filter(row => {
        if (keyword && !row._search.includes(keyword)) return false;
        if (site && row.site_name !== site) return false;
        if (status && row.status !== status) return false;

        for (const quick of state.quickFilters) {
          if (!matchQuickFilter(row, quick)) return false;
        }
        return true;
      });

      rows = sortRows(rows, state.sortKey, state.sortDirection);
      state.filtered = rows;
      visibleCount.textContent = rows.length.toLocaleString();
      statusText.textContent = rows.length
        ? `${rows.length.toLocaleString()}件表示中 / 総件数 ${state.rows.length.toLocaleString()}件`
        : "該当データがありません";
      renderTable(rows);
    }

    function matchQuickFilter(row, key) {
      const text = row._search;
      switch (key) {
        case "network":
          return /光|回線|ネット|通信|softbank|ソフトバンク|au|nuro|sonet|mvno/i.test(text);
        case "ai":
          return /ai|chatgpt|生成ai|aio/i.test(text);
        case "meo":
          return /meo|口コミ/i.test(text);
        case "seo":
          return /seo/i.test(text);
        case "power":
          return /電力|新電力|太陽光|蓄電池/i.test(text);
        case "recurring":
          return row._isRecurring;
        case "active":
          return row.status === "active";
        case "new7":
          return row._isNew7;
        default:
          return true;
      }
    }

    function sortRows(rows, key, direction) {
      const sorted = [...rows];
      sorted.sort((a, b) => {
        let av = a[key] || "";
        let bv = b[key] || "";

        if (key.includes("_at") || key === "published_at") {
          av = parseDate(av);
          bv = parseDate(bv);
        } else {
          av = String(av).toLowerCase();
          bv = String(bv).toLowerCase();
        }

        if (av < bv) return direction === "asc" ? -1 : 1;
        if (av > bv) return direction === "asc" ? 1 : -1;
        return 0;
      });
      return sorted;
    }

    function parseDate(str) {
      if (!str) return 0;
      const normalized = String(str).replace(/年|\/|\./g, "-").replace(/月/g, "-").replace(/日/g, "");
      const time = new Date(normalized).getTime();
      return Number.isNaN(time) ? 0 : time;
    }

    function renderTable(rows) {
      if (!rows.length) {
        tableBody.innerHTML = '<tr><td colspan="12" class="empty">該当データがありません</td></tr>';
        return;
      }

      tableBody.innerHTML = rows.map(row => `
        <tr>
          <td class="nowrap">${escapeHtml(row.site_name || "")}</td>
          <td class="title-cell">
            <a class="title-link" href="${escapeAttr(row.detail_url || "#")}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(row.title || "(案件名なし)")}
            </a>
            <div class="muted small">${escapeHtml(trimText(row.summary || "", 120))}</div>
          </td>
          <td>${escapeHtml(row.company_name || "")}</td>
          <td>${escapeHtml(row.category || "")}</td>
          <td>${escapeHtml(row.contract_type || "")}</td>
          <td>${escapeHtml(trimText(row.reward_text || "", 90))}</td>
          <td>${escapeHtml(row.initial_cost || "")}</td>
          <td>${row._isRecurring ? '<span class="badge active">あり</span>' : escapeHtml(row.recurring_revenue || "")}</td>
          <td>${escapeHtml(row.area || "")}</td>
          <td>${renderStatusBadge(row.status)}</td>
          <td class="nowrap">${escapeHtml(row.published_at || "")}</td>
          <td class="nowrap">${escapeHtml(row.scraped_at || "")}</td>
        </tr>
      `).join("");
    }

    function renderStatusBadge(status) {
      if (status === "active") return '<span class="badge active">active</span>';
      if (status === "inactive") return '<span class="badge inactive">inactive</span>';
      return escapeHtml(status || "");
    }

    function trimText(text, max) {
      const t = String(text || "");
      return t.length > max ? t.slice(0, max) + "..." : t;
    }

    function handleSortSelectChange() {
      const value = sortFilter.value;
      const [key, direction] = value.split("_").length >= 3
        ? [value.replace(/_(asc|desc)$/, ""), value.endsWith("_asc") ? "asc" : "desc"]
        : ["scraped_at", "desc"];

      state.sortKey = key;
      state.sortDirection = direction;
      applyFilters();
    }

    function syncSortSelect() {
      sortFilter.value = `${state.sortKey}_${state.sortDirection}`;
    }

    function resetFilters() {
      keywordInput.value = "";
      siteFilter.value = "";
      statusFilter.value = "";
      sortFilter.value = "scraped_at_desc";
      state.sortKey = "scraped_at";
      state.sortDirection = "desc";
      state.quickFilters.clear();
      document.querySelectorAll(".chip").forEach(chip => chip.classList.remove("active"));
      applyFilters();
    }

    function applySingleQuickFilter(key) {
      state.quickFilters.clear();
      document.querySelectorAll(".chip").forEach(chip => chip.classList.remove("active"));
      state.quickFilters.add(key);
      const target = document.querySelector(`.chip[data-filter="${key}"]`);
      if (target) target.classList.add("active");
      applyFilters();
    }

    function downloadFilteredCsv() {
      if (!state.filtered.length) {
        alert("保存対象がありません");
        return;
      }

      const headers = Object.keys(state.filtered[0]).filter(k => !k.startsWith("_"));
      const csv = [
        headers.join(","),
        ...state.filtered.map(row => headers.map(h => csvEscape(row[h] || "")).join(","))
      ].join("\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const now = new Date();
      const fileName = `agency_jobs_filtered_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}_${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}.csv`;
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      const s = String(value ?? "");
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(str) {
      return escapeHtml(str);
    }
  </script>
</body>
</html>
